name: Name check

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Name to check (e.g. Acme Co)"
        required: true
      tlds:
        description: "Comma-separated TLDs"
        default: "com,io,ai,co,app,dev,org,net"
      social:
        description: "Check social handles (low confidence)"
        type: boolean
        default: true
      fail_on:
        description: "Critical channels — job fails if any is taken"
        default: "domain:com,github"
  workflow_call:
    inputs:
      name: { required: true, type: string }
      tlds: { type: string, default: "com,io,ai,co,app,dev,org,net" }
      social: { type: boolean, default: true }
      fail_on: { type: string, default: "domain:com,github" }

permissions:
  contents: read

defaults:
  run:
    working-directory: tools/name-availability

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Check name
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRAND_GH_TOKEN: ${{ secrets.BRAND_GH_TOKEN || github.token }}
        run: |
          python scripts/check_name.py "${{ inputs.name }}" \
            --tlds "${{ inputs.tlds }}" \
            ${{ inputs.social && '--social' || '--no-social' }} \
            --fail-on "${{ inputs.fail_on }}" \
            --json "result.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: name-check-${{ inputs.name }}
          path: tools/name-availability/result.json
