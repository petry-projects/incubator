# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: petry-projects/.github/standards/workflows/sonarcloud.yml
# Standard:        petry-projects/.github/standards/ci-standards.md#3-sonarcloud-analysis
#
# ADOPTING THIS WORKFLOW:
#   1. This ships verbatim into repos created from petry-projects/repo-template.
#   2. Set sonar.projectKey / sonar.organization in sonar-project.properties to
#      match your repo (see BOOTSTRAP.md), and add the SONAR_TOKEN repo secret.
#   3. The job name `SonarCloud` is the required status check — keep it.
#   4. The scan is guarded on SONAR_TOKEN, so the job is a green no-op until the
#      secret is set — a fresh repo is not blocked on day 0.
#
# CONVENTIONS (enforced by the standard):
#   • permissions: {} at top, least-privilege per job (contents + pull-requests: read)
#   • triggers: push + pull_request to main; checkout with fetch-depth: 0
#   • first scan is continue-on-error with a single retry (SonarCloud's analysis
#     endpoint is occasionally flaky); a backoff precedes the retry so it lands
#     after the transient blip clears instead of immediately re-hitting it — sized
#     to outlast a minute-scale outage, not just a momentary one
#   • SHA-pin every third-party action (never a tag/branch)
# ─────────────────────────────────────────────────────────────────────────────
name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

# Cancel a superseded scan when a newer commit lands on the same ref. p50 was a
# healthy 78s but p95 reached ~14h (issue #31) — far beyond the job's 25-minute
# execution timeout, so that tail is queue/pending time, not a slow scan: with no
# concurrency control, superseded/hung runs were never cancelled ("Cancelled
# Runs: 0"), piling up and holding runner capacity while newer runs queued for
# hours before failing. Keying on github.ref alone (not ref+sha) means a newer
# commit supersedes and cancels the older still-in-flight run, draining the queue.
concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Job-level backstop: bound the whole job so a hang anywhere (checkout, a
    # scan that stalls before its own step timeout, etc.) fails fast instead of
    # running to GitHub's 6-hour default. Kept above the sum of the two scan
    # step timeouts + backoff so a genuine retry is never killed prematurely.
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        id: sonar
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        # Step timeout so a hung scan (SonarCloud's endpoint occasionally stalls
        # rather than erroring) fails fast — letting continue-on-error mark it
        # failed and trigger the backoff + retry, instead of hanging for hours.
        timeout-minutes: 10
        continue-on-error: true
      - name: Backoff before retry
        if: env.SONAR_TOKEN != '' && steps.sonar.outcome == 'failure'
        # Wait long enough that the single retry lands *after* a typical transient
        # clears. SonarCloud/API blips and rate-limit windows are usually
        # minute-scale, so a 30s backoff re-hit the same outage and both attempts
        # failed together — the driver behind the degraded failure rate. 60s
        # outlasts a minute-scale transient while staying well inside the job's
        # 25-minute backstop (10 + 1 + 10 ≈ 21 min worst case). Paid only on the
        # failure path; the happy path (first scan succeeds) never waits.
        run: sleep 60
      - name: SonarCloud Scan (retry)
        if: env.SONAR_TOKEN != '' && steps.sonar.outcome == 'failure'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        # Bound the retry too, so a hang on the second attempt also fails fast.
        timeout-minutes: 10